name: CI Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: gitops-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # ✅ Updated version (Node 24 compatible)
      - name: Checkout Code
        uses: actions/checkout@v4

      # ✅ Updated Docker login action
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build image
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

      # Push image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # Update GitOps repo
      # - name: Update Kubernetes Manifest
      #   run: |
      #     git clone https://github.com/Siddhuge/gitops-manifests.git
      #     cd gitops-manifests/k8s

      #     sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}|g" deployment.yaml

      #     git config user.name "github-actions"
      #     git config user.email "actions@github.com"

      #     git add .
      #     git commit -m "Update image to ${{ github.sha }}"
      #     git push https://${{ secrets.GIT_TOKEN }}@github.com/Siddhuge/gitops-manifests.git

      - name: Update Kubernetes Manifest
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          git clone https://${GIT_TOKEN}@github.com/Siddhuge/gitops-manifests.git
          cd gitops-manifests/k8s
          
          sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}|g" deployment.yaml
          
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update image to ${{ github.sha }}"
            git push
          fi
